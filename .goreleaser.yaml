version: 2

project_name: suprsend
report_sizes: true
universal_binaries:
  - replace: true

before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy
    # you may remove this if you don't need go generate
    # - go generate ./...
    # - to generate build artifacts locally
    - make clean
    - make build

builds:
  - main: ./cmd/suprsend
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X go.szostok.io/version.version={{.Version}}
      - -X go.szostok.io/version.buildDate={{.Date}}
    goos:
      - linux
      - windows
      - darwin

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - name: suprsend
    homepage: https://github.com/suprsend/homebrew-tap
    commit_author:
      name: suprsend_bot
      email: bot@suprsend.com
    repository:
      owner: suprsend
      name: homebrew-tap
      token: "{{ .Env.GITHUB_TOKEN }}"
      git:
        url: git@github.com:suprsend/homebrew-tap.git
        private_key: "{{ .Env.PRIVATE_KEY_PATH }}"
